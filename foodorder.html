<!DOCTYPE html>
<html>
    <body>
        <head>
                <title>FOOD ORDER</title>
        </head>
        <table>
            <tr>
                <td><h1>Food Order</h1></td>
            </tr>
            <tr>
                <td>Name:</td>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <td>Street:</td>
                <td>Door No:</td>
                <td><input type="number" id="door no"></td>
                <td>Street Name:</td>
                <td><input type="text" id="street name"></td>
                <td>Area:</td>
                <td><input type="text" id="area"></td>
                <td>District:</td>
                 <td><select name="district">
                    <option>--select--</option>
                    <option value="cuddalore">Cuddalore</option>
                    <option value="chennai"> Chennai</option>
                    <option value="madurai">Madurai</option>
                    <option value="kanchipuram"> Kanchipuram</option>
                    <option value="salem"> Salem</option>
                    <option value="villupuram"> Villupuram</option>
                    <option value="theni">Theni</option>
                    <option value="thanjavur">Thanjavur</option>
                </select></td>
                <td>Pincode:</td>
                <td><input type="number" id="pincode"></td>
            </tr>
            <tr>
                <td>Phone Number: </td>
                <td>
                    <select name="county code">
                    <option>--select--</option>
                    <option value="+91">+91</option>
                    <option value="+81">+81</option>
                    <option value="+96">+96</option>
                </select></td>
                <td><input type="number" id="phone number"> </td>
            </tr>
            <tr>
                <td>Perference:</td>
                <td><input type="radio" name="perference" value="veg">Veg <input type="radio" name="perference" value="non veg">Non Veg</td>
            </tr>
            <tr>
                <td>Restarurants:
                </td>
                 
                <td><select name="restarurants">
                    <option>--select--</option>
                    <option value="a2b">A2B</option>
                    <option value="AR biryani"> AR Biriyani </option>
                    <option value="nila hotel "> Nila Hotel</option>
                    <option value="aantha bhavan"> Aanatha Bhavan</option>
                </select></td>
            </tr>
            <tr>
                <td>Food Items:</td>
                </td>
                <td><select name="food items">
                    <option>--select--</option>
                    <option value="parato">Parota</option>
                    <option value="biryani"> Biriyani </option>
                    <option value="fried rice  "> Fried Rice </option>
                    <option value="noodles"> Noodles</option>
                </select></td>
            </tr>
            <tr>
                <td>Quantity:</td>
                <td><input type="number" id="quantity"></td>
            </tr>
           <img src="image/biriyani.jpg"  width="200px" height="200px" alt="biryani"/>
           <img src="image/parotas.png.png" width="200px" height="200px" alt="parato" />
           <tr>
            <td><input type="submit" value="Order Now"></td>
           </tr>
        </table>
    </body>
</html>
